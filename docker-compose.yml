version: "3.9"
services:
  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - storage:/app/storage
      - db:/app/db
    environment:
      - DATABASE_URL=sqlite:////app/db/dev.sqlite3
      - ENVIRONMENT=development
volumes:
  storage:
  db: